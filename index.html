<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>课表管理系统</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        .course-cell {
            min-height: 80px; /* 增加高度以防内容过多 */
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .course-cell:hover {
            background-color: #f3f4f6;
        }
        .course-cell:empty::after {
            content: "无课";
            color: #d1d5db;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 0.8rem;
            pointer-events: none;
        }
        /* 拖拽时的样式 */
        .dragging {
            opacity: 0.5;
            border: 2px dashed #3b82f6;
        }
        .drag-over {
            background-color: #dbeafe;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-7xl mx-auto">
        <!-- 顶部控制栏 -->
        <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
            <h1 class="text-3xl font-bold text-gray-800">课表管理系统</h1>
            <div class="flex flex-wrap gap-2 justify-center">
                <button id="prevWeek" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition shadow">
                    ← 上一周
                </button>
                <span id="weekInfo" class="px-4 py-2 bg-white border border-gray-300 rounded text-lg font-medium text-gray-700 flex items-center"></span>
                <button id="nextWeek" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 transition shadow">
                    下一周 →
                </button>
                <button id="exportPdf" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 transition shadow">
                    📄 导出 PDF
                </button>
                <button id="resetData" class="px-4 py-2 bg-red-500 text-white rounded hover:bg-red-600 transition shadow" title="清除本地缓存，恢复默认课表">
                    🔄 重置课表
                </button>
            </div>
        </div>

        <!-- 课表容器 -->
        <div id="timetableContainer" class="overflow-x-auto bg-white rounded-lg shadow-md p-2">
            <table class="w-full border-collapse min-w-[800px]">
                <thead>
                    <tr class="bg-gray-100">
                        <th class="border border-gray-300 px-2 py-3 text-left font-semibold w-32">节次/时间</th>
                        <th class="border border-gray-300 px-2 py-3 text-center font-semibold">周一</th>
                        <th class="border border-gray-300 px-2 py-3 text-center font-semibold">周二</th>
                        <th class="border border-gray-300 px-2 py-3 text-center font-semibold">周三</th>
                        <th class="border border-gray-300 px-2 py-3 text-center font-semibold">周四</th>
                        <th class="border border-gray-300 px-2 py-3 text-center font-semibold">周五</th>
                    </tr>
                </thead>
                <tbody id="timetableBody">
                    <!-- 课程内容将通过 JS 渲染 -->
                </tbody>
            </table>
        </div>
        
        <div class="mt-4 text-sm text-gray-500 text-center">
            💡 提示：点击单元格可编辑内容；拖拽单元格可交换课程位置。
        </div>
    </div>

    <script>
        // 默认课表数据
        const defaultTimetable = {
            "早读": ["语文\n六 14 班", "语文\n六 9 班", "语文\n六 9 班", "", "语文\n六 14 班"],
            "第一节\n8:00~8:40": ["语文\n六 9 班", "", "", "语文\n六 14 班", ""],
            "第二节\n8:50~9:30": ["", "语文\n六 14 班", "语文\n六 9 班", "", "语文\n六 9 班"],
            "大课间\n9:30-10:15": ["", "", "", "", ""],
            "第三节*眼操\n10:15-11:00": ["语文\n六 14 班", "语文\n六 9 班", "", "语文\n六 14 班", ""],
            "第四节\n11:10-11:50": ["", "", "", "语文\n六 9 班", "语文\n六 14 班"],
            "午休年会\n12:30-12:50": ["班团队会\n六 14 班", "语文\n六 14 班", "", "", "语文\n六 9 班"],
            "第五节\n13:00~13:40": ["班团队会\n六 14 班", "", "语文\n六 14 班", "", ""],
            "第六节\n13:50~14:30": ["", "", "", "", ""],
            "大课间\n14:30-15:00": ["", "", "", "", ""],
            "第七节\n15:00~15:40": ["", "", "语文\n六 9 班", "", ""],
            "第八节\n15:50~16:30": ["语文\n六 9 班", "语文\n六 14 班", "", "", ""],
            "第九节\n16:40~17:20": ["", "语文\n六 9 班", "语文\n六 14 班", "", ""]
        };

        // 日期配置：2026 年 3 月 9 日为第 1 周
        const startDate = new Date(2026, 2, 9);
        let currentWeek = 0;

        // 初始化
        function init() {
            renderTimetable();
            setupDragAndDrop();
            updateWeekInfo();
        }

        // 从本地存储加载课表（增加校验逻辑）
        function loadTimetable() {
            const key = `timetable_week_${currentWeek}`;
            const saved = localStorage.getItem(key);
            
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    // 校验数据是否有效（必须有键值对）
                    if (parsed && Object.keys(parsed).length > 0) {
                        return parsed;
                    }
                } catch (e) {
                    console.error("本地数据损坏，重置为默认");
                }
            }
            return defaultTimetable;
        }

        // 保存课表到本地存储
        function saveTimetable(data) {
            localStorage.setItem(`timetable_week_${currentWeek}`, JSON.stringify(data));
        }

        // 渲染课表
        function renderTimetable() {
            const tbody = document.getElementById('timetableBody');
            const data = loadTimetable();
            tbody.innerHTML = '';

            Object.keys(data).forEach(section => {
                const row = document.createElement('tr');
                
                // 节次列
                const sectionCell = document.createElement('td');
                sectionCell.className = 'border border-gray-300 px-2 py-3 font-medium bg-gray-50 text-sm whitespace-pre-line';
                sectionCell.textContent = section;
                row.appendChild(sectionCell);

                // 周一到周五列
                data[section].forEach((content, dayIndex) => {
                    const cell = document.createElement('td');
                    // 添加 data 属性用于拖拽识别
                    cell.className = 'border border-gray-300 px-2 py-3 course-cell text-sm whitespace-pre-line';
                    cell.dataset.section = section;
                    cell.dataset.day = dayIndex;
                    
                    // 处理内容显示
                    if (content && content.trim() !== "") {
                        cell.innerHTML = content.replace(/\n/g, '<br>');
                    } else {
                        cell.innerHTML = ""; // 留空，CSS 会显示“无课”
                    }
                    
                    cell.addEventListener('click', () => editCell(cell));
                    row.appendChild(cell);
                });

                tbody.appendChild(row);
            });
        }

        // 编辑单元格内容
        function editCell(cell) {
            // 防止重复创建输入框
            if (cell.querySelector('textarea')) return;

            const currentText = cell.innerText; // 使用 innerText 获取纯文本
            const input = document.createElement('textarea');
            input.className = 'w-full h-full p-1 border border-blue-500 rounded focus:outline-none focus:ring-2 focus:ring-blue-200';
            input.value = currentText;
            input.style.resize = 'none';
            input.style.height = '100%';
            
            cell.innerHTML = '';
            cell.appendChild(input);
            input.focus();

            const saveEdit = () => {
                const newText = input.value.trim();
                // 更新视觉
                if (newText) {
                    cell.innerHTML = newText.replace(/\n/g, '<br>');
                } else {
                    cell.innerHTML = "";
                }
                
                // 更新数据
                const data = loadTimetable();
                data[cell.dataset.section][cell.dataset.day] = newText;
                saveTimetable(data);
            };

            input.addEventListener('blur', saveEdit);
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    input.blur();
                }
            });
        }

        // 设置拖拽排序 (原生 Drag API)
        function setupDragAndDrop() {
            const cells = document.querySelectorAll('.course-cell');
            cells.forEach(cell => {
                cell.setAttribute('draggable', 'true');
                
                cell.addEventListener('dragstart', function(e) {
                    this.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                    // 存储被拖拽元素的信息
                    e.dataTransfer.setData('text/plain', JSON.stringify({
                        section: this.dataset.section,
                        day: this.dataset.day
                    }));
                });

                cell.addEventListener('dragend', function() {
                    this.classList.remove('dragging');
                    document.querySelectorAll('.course-cell').forEach(c => c.classList.remove('drag-over'));
                });

                cell.addEventListener('dragover', function(e) {
                    e.preventDefault(); // 必须阻止默认行为才能允许 drop
                    e.dataTransfer.dropEffect = 'move';
                    if (this !== document.querySelector('.dragging')) {
                        this.classList.add('drag-over');
                    }
                });

                cell.addEventListener('dragleave', function() {
                    this.classList.remove('drag-over');
                });

                cell.addEventListener('drop', function(e) {
                    e.preventDefault();
                    this.classList.remove('drag-over');
                    const draggingCell = document.querySelector('.dragging');
                    
                    if (draggingCell && draggingCell !== this) {
                        // 1. 交换视觉内容 (innerHTML)
                        const tempHTML = draggingCell.innerHTML;
                        draggingCell.innerHTML = this.innerHTML;
                        this.innerHTML = tempHTML;

                        // 2. 交换底层数据
                        const data = loadTimetable();
                        const sourceSection = draggingCell.dataset.section;
                        const sourceDay = draggingCell.dataset.day;
                        const targetSection = this.dataset.section;
                        const targetDay = this.dataset.day;

                        const tempData = data[sourceSection][sourceDay];
                        data[sourceSection][sourceDay] = data[targetSection][targetDay];
                        data[targetSection][targetDay] = tempData;
                        
                        saveTimetable(data);
                    }
                });
            });
        }

        // 更新周次信息
        function updateWeekInfo() {
            const weekStart = new Date(startDate);
            weekStart.setDate(startDate.getDate() + currentWeek * 7);
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekStart.getDate() + 4); // 只显示到周五

            const format = (date) => `${date.getMonth() + 1}月${date.getDate()}日`;
            document.getElementById('weekInfo').textContent = `第${currentWeek + 1}周 (${format(weekStart)} - ${format(weekEnd)})`;
        }

        // 切换周次
        document.getElementById('prevWeek').addEventListener('click', () => {
            if (currentWeek > 0) {
                currentWeek--;
                renderTimetable();
                setupDragAndDrop();
                updateWeekInfo();
            } else {
                alert("已经是第一周了");
            }
        });

        document.getElementById('nextWeek').addEventListener('click', () => {
            currentWeek++;
            renderTimetable();
            setupDragAndDrop();
            updateWeekInfo();
        });

        // 重置数据
        document.getElementById('resetData').addEventListener('click', () => {
            if(confirm('确定要重置当前周的课表为默认状态吗？此操作不可撤销。')) {
                localStorage.removeItem(`timetable_week_${currentWeek}`);
                renderTimetable();
                setupDragAndDrop();
                alert('已重置为默认课表');
            }
        });

        // 导出 PDF (修复版)
        document.getElementById('exportPdf').addEventListener('click', () => {
            const element = document.getElementById('timetableContainer');
            const originalOverflow = element.style.overflow;
            const originalShadow = element.style.boxShadow;
            
            // 1. 临时修改样式以捕获完整内容
            element.style.overflow = 'visible'; // 关键：允许内容溢出以便截图
            element.style.boxShadow = 'none';   // 去除阴影让 PDF 更干净
            
            // 临时移除所有单元格的 hover 效果，避免截图时有背景色
            document.querySelectorAll('.course-cell').forEach(c => c.style.backgroundColor = 'white');

            const opt = {
                margin: 10,
                filename: `课表_第${currentWeek + 1}周.pdf`,
                image: { type: 'jpeg', quality: 0.98 },
                html2canvas: { 
                    scale: 2,
                    useCORS: true,
                    logging: false
                },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'landscape' }
            };

            // 显示加载提示
            const btn = document.getElementById('exportPdf');
            const originalText = btn.textContent;
            btn.textContent = '生成中...';
            btn.disabled = true;

            html2pdf().set(opt).from(element).save().then(() => {
                // 2. 恢复样式
                element.style.overflow = originalOverflow;
                element.style.boxShadow = originalShadow;
                document.querySelectorAll('.course-cell').forEach(c => c.style.backgroundColor = '');
                btn.textContent = originalText;
                btn.disabled = false;
            }).catch(err => {
                console.error(err);
                alert('导出失败，请检查控制台或尝试缩小浏览器窗口后重试');
                btn.textContent = originalText;
                btn.disabled = false;
            });
        });

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
