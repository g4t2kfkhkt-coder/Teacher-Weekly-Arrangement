<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的课表</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 jsPDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <!-- 引入 html2canvas (导出 PDF 必须) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        .course-cell {
            min-height: 60px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .course-cell:hover {
            background-color: #f3f4f6;
        }
        .sortable-ghost {
            opacity: 0.4;
            background-color: #e5e7eb;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800">我的课表</h1>
            <div class="flex gap-2">
                <button id="prevWeek" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">上一周</button>
                <span id="weekInfo" class="px-4 py-2 bg-white border rounded"></span>
                <button id="nextWeek" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">下一周</button>
                <button id="exportPdf" class="px-4 py-2 bg-green-600 text-white rounded hover:bg-green-700 flex items-center gap-2">
                    <span>导出 PDF</span>
                </button>
            </div>
        </div>

        <div id="timetable" class="overflow-x-auto">
            <table class="w-full border-collapse bg-white shadow-md rounded-lg">
                <thead>
                    <tr class="bg-gray-100">
                        <th class="border p-3 text-center">节次</th>
                        <th class="border p-3 text-center">周一</th>
                        <th class="border p-3 text-center">周二</th>
                        <th class="border p-3 text-center">周三</th>
                        <th class="border p-3 text-center">周四</th>
                        <th class="border p-3 text-center">周五</th>
                    </tr>
                </thead>
                <tbody id="timetableBody">
                    <!-- 内容由 JS 动态生成 -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- 编辑弹窗 -->
    <div id="editModal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden z-50">
        <div class="bg-white p-6 rounded-lg w-80 shadow-xl">
            <h3 class="text-lg font-bold mb-4">编辑课程</h3>
            <textarea id="editInput" class="w-full p-2 border rounded mb-4" rows="4"></textarea>
            <div class="flex justify-end gap-2">
                <button id="cancelEdit" class="px-4 py-2 bg-gray-200 rounded hover:bg-gray-300">取消</button>
                <button id="saveEdit" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">保存</button>
            </div>
        </div>
    </div>

    <script>
        const { jsPDF } = window.jspdf;
        const startDate = new Date(2026, 2, 9); // 2026 年 3 月 9 日
        let currentWeek = 0;
        let currentEditCell = null;

        // 【已更新】默认课表数据 (根据新图片)
        const defaultTimetable = [
            // 0. 早读
            [
                { text: "语文\n六 14 班", time: "7:20-7:50" },
                { text: "语文\n六 9 班", time: "7:20-7:50" },
                { text: "语文\n六 9 班", time: "7:20-7:50" },
                { text: "", time: "7:20-7:50" },
                { text: "语文\n六 14 班", time: "7:20-7:50" }
            ],
            // 1. 第一节
            [
                { text: "语文\n六 9 班", time: "8:00~8:40" },
                { text: "", time: "8:00~8:40" },
                { text: "", time: "8:00~8:40" },
                { text: "语文\n六 14 班", time: "8:00~8:40" },
                { text: "", time: "8:00~8:40" }
            ],
            // 2. 第二节
            [
                { text: "", time: "8:50~9:30" },
                { text: "语文\n六 14 班", time: "8:50~9:30" },
                { text: "语文\n六 9 班", time: "8:50~9:30" },
                { text: "", time: "8:50~9:30" },
                { text: "语文\n六 9 班", time: "8:50~9:30" }
            ],
            // 3. 大课间 (合并单元格)
            [
                { text: "大课间\n9:30-10:15", time: "9:30-10:15", colspan: 5 },
            ],
            // 4. 第三节
            [
                { text: "语文\n六 14 班", time: "10:15-11:00" },
                { text: "语文\n六 9 班", time: "10:15-11:00" },
                { text: "", time: "10:15-11:00" },
                { text: "语文\n六 14 班", time: "10:15-11:00" },
                { text: "", time: "10:15-11:00" }
            ],
            // 5. 第四节
            [
                { text: "", time: "11:10-11:50" },
                { text: "", time: "11:10-11:50" },
                { text: "", time: "11:10-11:50" },
                { text: "语文\n六 9 班", time: "11:10-11:50" },
                { text: "语文\n六 14 班", time: "11:10-11:50" }
            ],
            // 6. 午休午会 (现在有具体内容了，不再是合并单元格)
            [
                { text: "班团队会\n六 14 班", time: "12:30-12:50" },
                { text: "语文\n六 14 班", time: "12:30-12:50" },
                { text: "", time: "12:30-12:50" },
                { text: "", time: "12:30-12:50" },
                { text: "语文\n六 9 班", time: "12:30-12:50" }
            ],
            // 7. 第五节
            [
                { text: "班团队会\n六 14 班", time: "13:00~13:40" },
                { text: "", time: "13:00~13:40" },
                { text: "语文\n六 9 班", time: "13:00~13:40" },
                { text: "", time: "13:00~13:40" },
                { text: "", time: "13:00~13:40" }
            ],
            // 8. 第六节
            [
                { text: "", time: "13:50~14:30" },
                { text: "", time: "13:50~14:30" },
                { text: "", time: "13:50~14:30" },
                { text: "", time: "13:50~14:30" },
                { text: "", time: "13:50~14:30" }
            ],
            // 9. 大课间 (合并单元格)
            [
                { text: "大课间\n14:30-15:00", time: "14:30-15:00", colspan: 5 },
            ],
            // 10. 第七节
            [
                { text: "", time: "15:00~15:40" },
                { text: "", time: "15:00~15:40" },
                { text: "语文\n六 9 班", time: "15:00~15:40" },
                { text: "", time: "15:00~15:40" },
                { text: "", time: "15:00~15:40" }
            ],
            // 11. 第八节
            [
                { text: "语文\n六 9 班", time: "15:50~16:30" },
                { text: "语文\n六 14 班", time: "15:50~16:30" },
                { text: "", time: "15:50~16:30" },
                { text: "", time: "15:50~16:30" },
                { text: "", time: "15:50~16:30" }
            ],
            // 12. 第九节 (新增)
            [
                { text: "", time: "16:40~17:20" },
                { text: "语文\n六 9 班", time: "16:40~17:20" },
                { text: "语文\n六 14 班", time: "16:40~17:20" },
                { text: "", time: "16:40~17:20" },
                { text: "", time: "16:40~17:20" }
            ]
        ];

        // 【已更新】行标签
        const rowLabels = [
            "早读\n7:20-7:50",
            "第一节\n8:00~8:40",
            "第二节\n8:50~9:30",
            "大课间\n9:30-10:15",
            "第三节\n10:15-11:00",
            "第四节\n11:10-11:50",
            "午休午会\n12:30-12:50",
            "第五节\n13:00~13:40",
            "第六节\n13:50~14:30",
            "大课间\n14:30-15:00",
            "第七节\n15:00~15:40",
            "第八节\n15:50~16:30",
            "第九节\n16:40~17:20"
        ];

        // 加载本地存储数据
        function loadTimetable(week) {
            const key = `timetable_week_${week}`;
            const stored = localStorage.getItem(key);
            return stored ? JSON.parse(stored) : JSON.parse(JSON.stringify(defaultTimetable));
        }

        // 保存课表到本地存储
        function saveTimetable(week, data) {
            const key = `timetable_week_${week}`;
            localStorage.setItem(key, JSON.stringify(data));
        }

        // 渲染课表
        function renderTimetable() {
            const data = loadTimetable(currentWeek);
            const tbody = document.getElementById('timetableBody');
            tbody.innerHTML = '';

            data.forEach((row, rowIndex) => {
                const tr = document.createElement('tr');
                const rowLabel = document.createElement('td');
                rowLabel.className = 'border p-3 text-center font-medium bg-gray-50';
                rowLabel.innerHTML = rowLabels[rowIndex].replace(/\n/g, '<br>');
                tr.appendChild(rowLabel);

                row.forEach((cell, colIndex) => {
                    const td = document.createElement('td');
                    td.className = 'border p-3 text-center course-cell';
                    td.dataset.row = rowIndex;
                    td.dataset.col = colIndex;
                    td.innerHTML = cell.text.replace(/\n/g, '<br>');
                    
                    if (cell.colspan) {
                        td.colSpan = cell.colspan;
                        td.className += ' bg-gray-100 font-bold';
                    } else {
                        td.draggable = true;
                        td.addEventListener('click', () => openEditModal(td));
                    }
                    
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });

            initDragAndDrop();
            updateWeekInfo();
        }

        // 初始化拖拽交换
        function initDragAndDrop() {
            const cells = document.querySelectorAll('.course-cell:not([colspan])');
            let draggedCell = null;

            cells.forEach(cell => {
                cell.addEventListener('dragstart', (e) => {
                    draggedCell = cell;
                    cell.classList.add('sortable-ghost');
                    e.dataTransfer.effectAllowed = 'move';
                });

                cell.addEventListener('dragend', () => {
                    cell.classList.remove('sortable-ghost');
                    draggedCell = null;
                });

                cell.addEventListener('dragover', (e) => {
                    e.preventDefault();
                    e.dataTransfer.dropEffect = 'move';
                });

                cell.addEventListener('drop', (e) => {
                    e.preventDefault();
                    if (draggedCell && draggedCell !== cell) {
                        const row1 = parseInt(draggedCell.dataset.row);
                        const col1 = parseInt(draggedCell.dataset.col);
                        const row2 = parseInt(cell.dataset.row);
                        const col2 = parseInt(cell.dataset.col);
                        
                        const data = loadTimetable(currentWeek);
                        const temp = data[row1][col1];
                        data[row1][col1] = data[row2][col2];
                        data[row2][col2] = temp;
                        
                        saveTimetable(currentWeek, data);
                        renderTimetable();
                    }
                });
            });
        }

        // 编辑弹窗
        function openEditModal(cell) {
            currentEditCell = cell;
            const row = parseInt(cell.dataset.row);
            const col = parseInt(cell.dataset.col);
            const data = loadTimetable(currentWeek);
            document.getElementById('editInput').value = data[row][col].text;
            document.getElementById('editModal').classList.remove('hidden');
        }

        document.getElementById('saveEdit').addEventListener('click', () => {
            if (currentEditCell) {
                const row = parseInt(currentEditCell.dataset.row);
                const col = parseInt(currentEditCell.dataset.col);
                const data = loadTimetable(currentWeek);
                data[row][col].text = document.getElementById('editInput').value;
                saveTimetable(currentWeek, data);
                renderTimetable();
                document.getElementById('editModal').classList.add('hidden');
                currentEditCell = null;
            }
        });

        document.getElementById('cancelEdit').addEventListener('click', () => {
            document.getElementById('editModal').classList.add('hidden');
            currentEditCell = null;
        });

        // 周次切换
        function updateWeekInfo() {
            const weekStart = new Date(startDate);
            weekStart.setDate(startDate.getDate() + currentWeek * 7);
            const weekEnd = new Date(weekStart);
            weekEnd.setDate(weekStart.getDate() + 4);
            
            const format = (date) => `${date.getMonth() + 1}月${date.getDate()}日`;
            document.getElementById('weekInfo').textContent = `第${currentWeek + 1}周：${format(weekStart)} - ${format(weekEnd)}`;
        }

        document.getElementById('prevWeek').addEventListener('click', () => {
            if (currentWeek > 0) {
                currentWeek--;
                renderTimetable();
            }
        });

        document.getElementById('nextWeek').addEventListener('click', () => {
            currentWeek++;
            renderTimetable();
        });

        // 导出 PDF 功能
        document.getElementById('exportPdf').addEventListener('click', async () => {
            const btn = document.getElementById('exportPdf');
            const originalText = btn.innerHTML;
            btn.innerHTML = '生成中...';
            btn.disabled = true;

            try {
                const element = document.getElementById('timetable');
                
                const canvas = await html2canvas(element, {
                    scale: 2,
                    backgroundColor: '#ffffff',
                    useCORS: true
                });

                const imgData = canvas.toDataURL('image/png');
                const pdf = new jsPDF('l', 'mm', 'a4');
                const pdfWidth = pdf.internal.pageSize.getWidth();
                const pdfHeight = pdf.internal.pageSize.getHeight();
                
                const imgWidth = pdfWidth - 20;
                const imgHeight = (canvas.height * imgWidth) / canvas.width;
                
                let finalHeight = imgHeight;
                let finalWidth = imgWidth;
                
                if (imgHeight > pdfHeight - 20) {
                    const ratio = (pdfHeight - 20) / imgHeight;
                    finalHeight = pdfHeight - 20;
                    finalWidth = imgWidth * ratio;
                }

                pdf.addImage(imgData, 'PNG', 10, 10, finalWidth, finalHeight);
                pdf.save(`课表_第${currentWeek + 1}周.pdf`);
            } catch (error) {
                console.error('导出失败:', error);
                alert('导出 PDF 失败，请查看控制台错误信息');
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        // 初始化
        renderTimetable();
    </script>
</body>
</html>
